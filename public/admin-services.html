<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin – Kezelések</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/custom.css">
</head>

<body class="site-bg min-h-screen text-emerald-50">

<header class="sticky top-0 z-50 border-b border-emerald-200/10 bg-emerald-950/80 backdrop-blur">
  <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4">
    <h1 class="text-xl font-semibold">Kezelések</h1>

    <a href="/admin-dashboard.html"
      class="rounded-2xl border border-white/10 bg-white/[0.06] px-4 py-2 text-sm font-semibold text-white/85 transition hover:bg-white/[0.10]">
      ← Vissza
    </a>
  </div>
</header>

<main class="mx-auto max-w-5xl px-4 py-10">

<section class="mb-10 overflow-hidden rounded-3xl border border-white/10 bg-white/[0.06] shadow-[0_10px_40px_-25px_rgba(0,0,0,0.8)] ring-1 ring-white/5 backdrop-blur-sm">

  <div class="border-b border-white/10 bg-white/[0.04] px-6 py-5">
    <h2 class="text-lg font-semibold text-white">
      Következő csoportos családállítás
    </h2>
    <p class="mt-1 text-sm text-white/60">
      Itt állíthatod be a weboldalon megjelenő időpontot. Mentés után a naptárban is foglalttá válik.
    </p>
  </div>

  <div class="p-6">
    <div class="grid gap-4 md:grid-cols-[1fr_1fr_auto_auto] md:items-end">

      <label class="block">
        <span class="mb-2 block text-sm font-medium text-white/75">
          Dátum
        </span>
        <input
          id="groupSessionDate"
          type="date"
          class="w-full rounded-2xl border border-white/10 bg-emerald-950/50 px-4 py-3 text-white outline-none ring-1 ring-white/5 transition focus:border-teal-300/40 focus:ring-teal-300/30"
        >
      </label>

      <label class="block">
        <span class="mb-2 block text-sm font-medium text-white/75">
          Idősáv
        </span>
        <select
          id="groupSessionSlot"
          class="w-full rounded-2xl border border-white/10 bg-emerald-950/50 px-4 py-3 text-white outline-none ring-1 ring-white/5 transition focus:border-teal-300/40 focus:ring-teal-300/30">
          <option value="">Idősáv betöltése...</option>
        </select>
      </label>

      <button
        onclick="saveGroupSession()"
        class="rounded-2xl bg-teal-300 px-5 py-3 text-sm font-semibold text-[#06201b] shadow-[0_16px_40px_-22px_rgba(94,234,212,0.9)] transition hover:bg-teal-200">
        Mentés
      </button>

      <button
        onclick="clearGroupSession()"
        class="rounded-2xl border border-red-300/20 bg-red-500/15 px-5 py-3 text-sm font-semibold text-red-100 transition hover:bg-red-500/25">
        Törlés
      </button>

    </div>

    <p id="groupSessionStatus" class="mt-4 text-sm text-teal-200/80"></p>
  </div>

</section>

<section class="mb-8 rounded-3xl border border-white/10 bg-white/[0.06] p-6 shadow-[0_10px_40px_-28px_rgba(0,0,0,0.75)] ring-1 ring-white/5 backdrop-blur-sm">

  <h2 class="text-lg font-semibold text-white">
    Új kezelés hozzáadása
  </h2>

  <div class="mt-5 grid gap-4 md:grid-cols-[1fr_180px_auto] md:items-end">

    <label class="block">
      <span class="mb-2 block text-sm font-medium text-white/75">
        Kezelés neve
      </span>
      <input
        id="newName"
        placeholder="Például: Hangfürdő"
        class="w-full rounded-2xl border border-white/10 bg-emerald-950/50 px-4 py-3 text-white placeholder:text-white/35 outline-none ring-1 ring-white/5 transition focus:border-teal-300/40 focus:ring-teal-300/30"
      >
    </label>

    <label class="block">
      <span class="mb-2 block text-sm font-medium text-white/75">
        Időtartam
      </span>
      <input
        id="newDuration"
        type="number"
        placeholder="perc"
        class="w-full rounded-2xl border border-white/10 bg-emerald-950/50 px-4 py-3 text-white placeholder:text-white/35 outline-none ring-1 ring-white/5 transition focus:border-teal-300/40 focus:ring-teal-300/30"
      >
    </label>

    <button
      onclick="addService()"
      class="rounded-2xl bg-teal-300 px-5 py-3 text-sm font-semibold text-[#06201b] shadow-[0_16px_40px_-22px_rgba(94,234,212,0.9)] transition hover:bg-teal-200">
      Hozzáadás
    </button>

  </div>

</section>

<section class="rounded-3xl border border-white/10 bg-white/[0.06] p-6 shadow-[0_10px_40px_-28px_rgba(0,0,0,0.75)] ring-1 ring-white/5 backdrop-blur-sm">

  <div class="mb-5 flex items-center justify-between gap-4">
    <div>
      <h2 class="text-lg font-semibold text-white">
        Kezelések listája
      </h2>
      <p class="mt-1 text-sm text-white/55">
        Ezek jelennek meg az időpontfoglalási oldalon.
      </p>
    </div>
  </div>

<p id="servicesOrderStatus" class="mb-3 text-sm text-teal-200/80"></p>
  <div id="servicesBox" class="space-y-3"></div>

</section>

</main>

<script>
async function checkAdmin(){
  const r = await fetch("/admin/check");
  const d = await r.json();
  if(!d.loggedIn) location.href="/admin-login.html";
}

async function loadServices() {
  const res = await fetch("/api/admin/services");
  const data = await res.json();

  const box = document.getElementById("servicesBox");
  box.innerHTML = "";

data.forEach(s => {
  const row = document.createElement("div");

  row.className = "service-row grid gap-3 rounded-2xl border border-white/10 bg-emerald-950/35 p-3 md:grid-cols-[40px_1fr_140px_auto_auto] md:items-center";
  row.draggable = false;
  row.dataset.id = s.id;

  row.innerHTML = `
    <div class="drag-handle cursor-grab select-none text-center text-xl text-white/45" draggable="true">
      ☰
    </div>

    <input value="${s.name}" id="name-${s.id}"
      class="w-full rounded-xl border border-white/10 bg-white/[0.07] px-4 py-3 text-white outline-none transition focus:border-teal-300/40 focus:ring-2 focus:ring-teal-300/20">

    <input type="number" value="${s.duration_minutes}" id="duration-${s.id}"
      class="w-full rounded-xl border border-white/10 bg-white/[0.07] px-4 py-3 text-white outline-none transition focus:border-teal-300/40 focus:ring-2 focus:ring-teal-300/20">

    <button onclick="save(${s.id})"
      class="rounded-xl bg-teal-300 px-4 py-3 text-sm font-semibold text-[#06201b] transition hover:bg-teal-200">
      Mentés
    </button>

    <button onclick="removeService(${s.id})"
      class="rounded-xl border border-red-300/20 bg-red-500/15 px-4 py-3 text-sm font-semibold text-red-100 transition hover:bg-red-500/25">
      Törlés
    </button>
  `;
    
  box.appendChild(row);
});

enableServiceDragAndDrop();
}

function enableServiceDragAndDrop() {
  const box = document.getElementById("servicesBox");
  if (!box) return;

  let draggedRow = null;

  box.querySelectorAll(".service-row").forEach(row => {
    row.addEventListener("dragstart", () => {
      draggedRow = row;
      row.classList.add("opacity-50");
    });

    row.addEventListener("dragend", async () => {
      row.classList.remove("opacity-50");
      draggedRow = null;
      await saveServiceOrder();
    });

    row.addEventListener("dragover", (e) => {
      e.preventDefault();

      const afterElement = getDragAfterElement(box, e.clientY);

      if (!draggedRow) return;

      if (afterElement == null) {
        box.appendChild(draggedRow);
      } else {
        box.insertBefore(draggedRow, afterElement);
      }
    });
  });
}

function getDragAfterElement(container, y) {
  const draggableElements = [
    ...container.querySelectorAll(".service-row:not(.opacity-50)")
  ];

  return draggableElements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;

    if (offset < 0 && offset > closest.offset) {
      return { offset, element: child };
    }

    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

async function saveServiceOrder() {
  const rows = [...document.querySelectorAll("#servicesBox .service-row")];
  const order = rows.map(row => Number(row.dataset.id));

  const res = await fetch("/api/admin/services/reorder", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ order })
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    alert(data.error || "Sorrend mentési hiba");
    return;
  }

  const status = document.getElementById("servicesOrderStatus");
  if (status) {
    status.textContent = "Sorrend mentve ✅";
    setTimeout(() => {
      status.textContent = "";
    }, 2000);
  }
}

async function save(id) {
  const name = document.getElementById(`name-${id}`).value;
  const duration = document.getElementById(`duration-${id}`).value;

  await fetch("/api/admin/services/update", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      id,
      name,
      duration: Number(duration)
    })
  });

  alert("Mentve ✅");
}

async function loadTimeSlotsForGroupSession() {
  const select = document.getElementById("groupSessionSlot");

  const res = await fetch("/api/time-slots");
  const slots = await res.json();

  select.innerHTML = `<option value="">Válassz idősávot</option>`;

  slots.forEach(slot => {
    const opt = document.createElement("option");
    opt.value = slot;
    opt.textContent = slot;
    select.appendChild(opt);
  });
}

async function loadGroupSession() {
  const res = await fetch("/api/admin/group-session");
  const data = await res.json();

  if (data && data.datetime) {
    document.getElementById("groupSessionDate").value = data.datetime.slice(0, 10);
  }

  if (data && data.slot) {
    document.getElementById("groupSessionSlot").value = data.slot;
  }
}

async function saveGroupSession() {
  const date = document.getElementById("groupSessionDate").value;
  const slot = document.getElementById("groupSessionSlot").value;

  if (!date || !slot) {
    alert("Adj meg dátumot és idősávot!");
    return;
  }

  const res = await fetch("/api/admin/group-session/update", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ date, slot })
  });

  const data = await res.json();

  if (!res.ok) {
    console.error("GROUP SESSION SAVE ERROR:", data);
    alert(data.error || "Mentési hiba");
    return;
  }

  document.getElementById("groupSessionStatus").textContent =
    "Időpont mentve, és a naptárban is lefoglalva ✅";
}

async function clearGroupSession() {
  if (!confirm("Biztos törlöd a csoportos családállítás időpontját?")) return;

  const res = await fetch("/api/admin/group-session/clear", {
    method: "POST"
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.error || "Törlési hiba");
    return;
  }

  document.getElementById("groupSessionDate").value = "";
  document.getElementById("groupSessionSlot").value = "";
  document.getElementById("groupSessionStatus").textContent =
    "Időpont törölve ✅";

  loadServices();
}

async function addService() {
  const name = document.getElementById("newName").value;
  const duration = document.getElementById("newDuration").value;

  if (!name || !duration) {
    alert("Adj meg nevet és időtartamot!");
    return;
  }

  await fetch("/api/admin/services/add", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name,
      duration: Number(duration)
    })
  });

  document.getElementById("newName").value = "";
  document.getElementById("newDuration").value = "";

  loadServices();
}

async function removeService(id) {
  if (!confirm("Biztos törlöd?")) return;

  const res = await fetch(`/api/admin/services/${id}`, {
    method: "DELETE"
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    alert(data.error || "Törlési hiba");
    return;
  }

  loadServices();
}

(async function init(){
  await checkAdmin();
  await loadTimeSlotsForGroupSession();
  await loadGroupSession();
  loadServices();
})();
</script>




</body>
</html>
